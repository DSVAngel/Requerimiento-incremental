<div class="container">

  <!-- Icon -->
  <div class="auth-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <h2>Nueva contraseña</h2>
  <p class="subtitle">
    Crea una contraseña segura para proteger<br>tu cuenta institucional.
  </p>

  <form [formGroup]="form" (ngSubmit)="submit()">

    <div class="input-group">
      <label for="password">Nueva contraseña</label>
      <div class="input-wrapper">
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Mínimo 8 caracteres"
          formControlName="password"
          autocomplete="new-password"
        />
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <button type="button" class="toggle-password" (click)="showPassword = !showPassword"
          [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
          <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="15" height="15"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="15" height="15"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- Password strength bar -->
      <div class="strength-bar" [ngClass]="passwordStrength" *ngIf="form.get('password')?.value">
        <span></span><span></span><span></span><span></span>
      </div>
      <p class="strength-label" *ngIf="form.get('password')?.value">
        {{ strengthLabel }}
      </p>
    </div>

    <div class="input-group">
      <label for="confirmPassword">Confirmar contraseña</label>
      <div class="input-wrapper">
        <input
          id="confirmPassword"
          [type]="showConfirm ? 'text' : 'password'"
          placeholder="Repite tu contraseña"
          formControlName="confirmPassword"
          autocomplete="new-password"
        />
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <button type="button" class="toggle-password" (click)="showConfirm = !showConfirm"
          [attr.aria-label]="showConfirm ? 'Ocultar contraseña' : 'Mostrar contraseña'">
          <svg *ngIf="!showConfirm" xmlns="http://www.w3.org/2000/svg" width="15" height="15"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showConfirm" xmlns="http://www.w3.org/2000/svg" width="15" height="15"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" [disabled]="loading || form.invalid">
      <span *ngIf="!loading">Restablecer contraseña</span>
      <span *ngIf="loading">Guardando&hellip;</span>
    </button>

  </form>

  <div class="message success" *ngIf="message && !isError">
    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    {{ message }}
  </div>

  <div class="message error" *ngIf="message && isError">
    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    {{ message }}
  </div>

  <div class="auth-footer">
    ¿Necesitas ayuda?
    <a routerLink="/soporte">Contacta a soporte</a>
  </div>

</div>
